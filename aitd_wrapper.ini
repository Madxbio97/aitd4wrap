[Fixes]
; Force 4:3 aspect ratio with pillarboxing (1=on, 0=off)
FixAspectRatio=1

; Force 32-bit color: pixel format + texture internal formats (1=on, 0=off)
FixColorDepth=1

; Force bilinear/trilinear texture filtering (1=on, 0=off)
FixTextureFilter=1

; Force GL_CLAMP_TO_EDGE to fix texture seams (1=on, 0=off)
; If repeating textures look wrong, try 0
FixTextureClamp=1

[Display]
; Windowed mode (1=windowed, 0=fullscreen)
Windowed=0

; Anti-aliasing MSAA samples (0=off, 2, 4, 8)
; Requires GPU driver support. Try 4 for a good balance.
MSAASamples=0

; Force resolution (0=game default)
; Example: ForceWidth=1024 ForceHeight=768
ForceWidth=0
ForceHeight=0

[Debug]
; Write log to aitd_wrapper.log (1=on, 0=off)
EnableLog=1

; Show MessageBox at startup (1=on, 0=off)
ShowDiagnostics=0
