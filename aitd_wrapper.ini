[Fixes]
; Force 4:3 aspect ratio with pillarboxing/letterboxing (1=on, 0=off)
FixAspectRatio=1

; Force 32-bit color: pixel format + texture internal formats (1=on, 0=off)
FixColorDepth=1

; Force bilinear/trilinear texture filtering (1=on, 0=off)
FixTextureFilter=1

; Force GL_CLAMP_TO_EDGE to fix texture seams (1=on, 0=off)
FixTextureClamp=1

; Anisotropic texture filtering level (0=off, 2, 4, 8, 16)
; 16 = maximum quality, recommended. Requires FixTextureFilter=1.
AnisoLevel=16

[Textures]
; Dump all unique textures to TGA files in aitd_textures\dump\ (1=on, 0=off)
; Each texture is saved as <HASH8>_<W>x<H>.tga — enable once to capture,
; then disable for normal play. Only GL_UNSIGNED_BYTE textures are captured.
DumpTextures=0

; Replace textures from aitd_textures\replace\ (1=on, 0=off)
; Copy a dumped file into replace\ with the same name.
; The replacement can have different dimensions — useful for upscaling.
; Only uncompressed 24-bit or 32-bit TGA is supported.
ReplaceTextures=0

[Display]
; Windowed mode (1=windowed, 0=fullscreen)
Windowed=0

; VSync via wglSwapIntervalEXT (1=on, 0=off)
; Prevents screen tearing. Recommended on.
VSync=1

; FPS cap (0=off, else target FPS e.g. 30, 60, 120)
; Use 0 when VSync=1 (VSync already caps to monitor refresh).
; Useful when VSync=0 to prevent runaway FPS affecting game timers.
FPSLimit=0

; Anti-aliasing MSAA samples (0=off, 2, 4, 8)
; Requires GPU driver support. Try 4 for a good balance.
MSAASamples=0

; Force resolution (0=game default)
; Example: ForceWidth=1024 ForceHeight=768
ForceWidth=0
ForceHeight=0

[Debug]
; Write log to aitd_wrapper.log (1=on, 0=off)
EnableLog=1

; Show MessageBox at startup (1=on, 0=off)
ShowDiagnostics=0
