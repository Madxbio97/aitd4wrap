[Fixes]
; Force 4:3 aspect ratio with pillarboxing/letterboxing (1=on, 0=off)
FixAspectRatio=1

; Force 32-bit color: pixel format + texture internal formats (1=on, 0=off)
FixColorDepth=1

; Force bilinear/trilinear texture filtering (1=on, 0=off)
FixTextureFilter=1

; Force GL_CLAMP_TO_EDGE to fix texture seams (1=on, 0=off)
FixTextureClamp=1

; Anisotropic texture filtering level (0=off, 2, 4, 8, 16)
AnisoLevel=16

; Fix fog rendering on modern OpenGL drivers (1=on, 0=off)
FixFog=1

[Rendering]
; MSAA anti-aliasing sample count (0=off, 2=2x, 4=4x, 8=8x)
; Renders into a multisampled FBO, then resolves to screen.
; True geometric AA â sharp edges without texture blur.
; 4x is a good default. 8x for maximum quality (slight GPU cost).
MSAASamples=4

[Audio]
; Force high-quality audio output: 44100Hz, 16-bit, stereo (1=on, 0=off)
FixAudioQuality=1

; Preserve sample loop state across screen transitions (1=on, 0=off)
PreserveLoops=0

; Stream fade-in duration in milliseconds (0=off, 50-500, default=100)
FadeInMs=100

; Stream fade-out duration in milliseconds (0=off, 100-1000, default=300)
FadeOutMs=300

; Volume boost for sound effects: 0=off, 10-100 recommended (max=127)
SampleVolumeBoost=0

; Custom audio mixer: replaces MSS sample playback (1=on, 0=off)
; REQUIRED for v19 features (WASAPI / reverb / stream manager).
; 32 channels, proper IMA ADPCM decode, eliminates MSS zombie samples.
EnableCustomMixer=1

; ==================================================================
; v19 AUDIO EXTENSIONS
; ==================================================================

; Low-latency WASAPI output (1=on, 0=off, default=0)
; Replaces legacy waveOut with Windows Core Audio. Native device sample
; rate (no resampling), ~10-15ms latency. Requires EnableCustomMixer=1.
EnableWASAPI=1

; WASAPI buffer latency in milliseconds (5-80, default=15)
; Lower = less delay but more CPU and risk of underruns.
; 15ms is safe on most systems. Try 10ms on high-end, 25-40ms on laptops.
WASAPILatencyMs=15

; Schroeder reverb on mixer output (1=on, 0=off, default=0)
; Adds atmospheric reverb suitable for AITD's horror ambience.
; Requires EnableCustomMixer=1.
EnableReverb=1

; Reverb wet mix level (0=dry, 100=all wet, default=18)
; 12-20 for subtle atmosphere, 25-40 for cathedral hall.
; Too high muddies dialog.
ReverbWet=18

; Reverb room size / feedback (0-100, default=55)
; Controls decay length. 30=small room, 55=medium hall, 80=cavern.
ReverbRoomSize=55

; Reverb high-frequency damping (0-100, default=60)
; Higher = warmer/darker (absorbs highs in the tail).
; 40-70 works for most environments.
ReverbDamping=60

; Custom stream player — replaces MSS streams with our mixer (1=on, 0=off)
; Pipes background music through the custom mixer (and WASAPI/reverb).
; Currently supports WAV streams only; MP3/other falls back to MSS.
EnableStreamMgr=1

; Loop crossfade in milliseconds (0=off, 5-50, default=15)
; Eliminates click at loop point of ambient sounds (wind, water, motors).
; 10-20ms works for most looping samples.
LoopCrossfadeMs=15

; ==================================================================
; v20 AUDIO EXTENSIONS
; ==================================================================

; Persistent PCM decoder cache (1=on, 0=off, default=0)
; Saves ADPCM→PCM decoder output to aitd_pcm_cache/<hash>.wav on disk.
; First run: decodes ADPCM, writes cache (small disk penalty).
; Subsequent runs: reads pre-decoded PCM (faster, avoids any ADPCM quirks).
; Safe to delete aitd_pcm_cache/ folder at any time — it rebuilds.
EnablePCMCache=1

; Pre-warm PCM cache into RAM at startup (1=on, 0=off, default=1)
; Loads all decoded WAV files from aitd_pcm_cache/ into memory during init.
; Uses ~52 MB RAM but eliminates ALL disk reads during gameplay.
; Dramatically reduces audio delay after room transitions.
EnablePCMPrewarm=1

; Dedup killer: kill duplicate ambient samples on different handles (1=on, 0=off)
; The game intentionally loads the same ambient sound on multiple handles
; for crossfading between rooms. Killing duplicates breaks this.
; Default: 0 (off — let the game manage its own sample lifetime)
EnableDedupKiller=0

; Zombie killer: clean up abandoned sample handles (1=on, 0=off, default=1)
; The game's adaptive music sometimes abandons handles without calling
; AIL_end_sample. These "zombie" handles occupy MSS channels and eventually
; starve new sounds. The killer detects samples stuck at the same position
; for 30+ seconds and cleans them up. The 30-second threshold is long enough
; for the game's pitch-ramp fades (which take 5-10 seconds) to finish.
EnableZombieKiller=1

; Dialog ducking: reduce MSS master volume during dialog playback (0=off)
; Value is percentage of original master volume (70 = duck to 70%).
; Lower values = more ducking. Requires EnableStreamMgr=1.
DialogDuckLevel=70

; ==================================================================
; v21 AUDIO: PER-CATEGORY VOLUME
; ==================================================================
; The game lumps environmental ambients (rain, wind, water) with music
; on the same volume slider. These settings let you control them separately.
; Values 0-200 (percentage). 100 = original game volume. 150 = 50% louder.

; Environmental ambient volume: 6xxx sounds (wind, rain, water, machinery)
VolAmbient=100

; Adaptive music volume: Drums/Bass/Voice/Noise/Synth/Organ/Percu/Strng stems
VolMusic=100

; Sound effects volume: 0xxx/2xxx/4xxx (footsteps, doors, impacts, UI)
VolSFX=100

; ==================================================================
; v21 AUDIO: HIGH-SHELF EQ
; ==================================================================
; Boosts high frequencies (above ~8 kHz) to compensate for IMA ADPCM
; compression artifacts. The original sounds lost clarity and "air" due
; to 4:1 lossy compression. This restores sparkle to rain, footsteps,
; and voices without touching the low/mid range.
; 0 = off, 1-6 = subtle, 3 = recommended, 6-12 = aggressive
EQHighShelfDb=3

[Textures]
DumpTextures=0
ReplaceTextures=0

[Display]
Windowed=0
Borderless=0
VSync=1
FPSLimit=0
ForceWidth=0
ForceHeight=0
ForceRefreshRate=0
ClipCursor=1
AllowAltEnter=1
GammaBoost=0

[Features]
ScreenshotKey=0x7B

[Compatibility]
SingleCore=0

[Debug]
EnableLog=1
ShowDiagnostics=0
